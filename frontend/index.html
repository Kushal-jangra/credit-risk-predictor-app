<!DOCTYPE html>
<html>
<head>
  <title>Credit Risk Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-xl">

  <h2 class="text-2xl font-bold text-center mb-6">
    💳 Credit Risk Predictor
  </h2>

  <form id="form" class="grid grid-cols-2 gap-4">

    <input type="number" id="person_age" placeholder="Age" class="input" required>
    <input type="number" id="person_income" placeholder="Income" class="input" required>

    <select id="person_home_ownership" class="input">
      <option>MORTGAGE</option>
      <option>RENT</option>
      <option>OWN</option>
      <option>OTHER</option>
    </select>

    <input type="number" id="person_emp_length" placeholder="Employment Length" class="input">

    <select id="loan_intent" class="input">
      <option>MEDICAL</option>
      <option>EDUCATION</option>
      <option>PERSONAL</option>
      <option>VENTURE</option>
      <option>DEBTCONSOLIDATION</option>
      <option>HOMEIMPROVEMENT</option>
    </select>

    <select id="loan_grade" class="input">
      <option>A</option>
      <option>B</option>
      <option>C</option>
      <option>D</option>
      <option>E</option>
    </select>

    <input type="number" id="loan_amnt" placeholder="Loan Amount" class="input">
    <input type="number" step="0.01" id="loan_int_rate" placeholder="Interest Rate" class="input">

    <input type="number" step="0.01" id="loan_percent_income" placeholder="Loan % Income" class="input">

    <select id="cb_person_default_on_file" class="input">
      <option>N</option>
      <option>Y</option>
    </select>

    <input type="number" id="cb_person_cred_hist_length" placeholder="Credit History Length" class="input">

    <button class="col-span-2 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
      Predict Risk
    </button>

  </form>

  <div id="resultBox" class="mt-6 text-center hidden">
    <h3 id="result" class="text-xl font-bold"></h3>
  </div>

</div>

<style>
.input {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
}
</style>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    person_age: Number(document.getElementById("person_age").value),
    person_income: Number(document.getElementById("person_income").value),
    person_home_ownership: document.getElementById("person_home_ownership").value,
    person_emp_length: Number(document.getElementById("person_emp_length").value),
    loan_intent: document.getElementById("loan_intent").value,
    loan_grade: document.getElementById("loan_grade").value,
    loan_amnt: Number(document.getElementById("loan_amnt").value),
    loan_int_rate: Number(document.getElementById("loan_int_rate").value),
    loan_percent_income: Number(document.getElementById("loan_percent_income").value),
    cb_person_default_on_file: document.getElementById("cb_person_default_on_file").value,
    cb_person_cred_hist_length: Number(document.getElementById("cb_person_cred_hist_length").value)
  };

  const res = await fetch("/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();

  const box = document.getElementById("resultBox");
  const text = document.getElementById("result");

  box.classList.remove("hidden");

  if(result.risk === "High Risk"){
    text.innerText = "⚠️ High Risk";
    text.className = "text-red-500 text-xl font-bold";
  } else {
    text.innerText = "✅ Low Risk";
    text.className = "text-green-500 text-xl font-bold";
  }
});
</script>

</body>
</html>
